services:
  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kehare_cho_development
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["bash", "-lc", "bin/dev"]
    tty: true
    stdin_open: true
    volumes:
      - .:/myapp
      - bundle_data:/usr/local/bundle:cached
      - node_modules:/myapp/node_modules
    environment:
      TZ: Asia/Tokyo
      HOME: /tmp
      COREPACK_HOME: /tmp/corepack
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      APP_UID: "${APP_UID:-1000}"
      APP_GID: "${APP_GID:-1000}"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      selenium:
        condition: service_started

  # ローカル開発用 Chrome コンテナ
  # WSL2 では Chrome を直接起動できない（seccomp 制限）ため、コンテナ化された Chrome に接続
  # テスト実行: docker compose exec web bundle exec rspec spec/system/
  selenium:
    image: selenium/standalone-chrome:latest
    shm_size: '2gb'
    environment:
      SE_VNC_NO_PASSWORD: "1"
    ports:
      - "4444:4444"

volumes:
  bundle_data:
  postgresql_data:
  node_modules:
