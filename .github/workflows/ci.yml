name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DB_HOST: localhost
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SECRET_KEY_BASE: "ci_dummy_secret_key_base_for_test_environment_only"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          bundle-without: production

      - name: Cache apt packages
        id: cache-libvips
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-libvips-${{ runner.os }}
          restore-keys: |
            apt-libvips-

      - name: Install libvips for image processing
        run: sudo apt-get update -qq && sudo apt-get install -y libvips-dev --no-install-recommends

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Install Node.js dependencies
        run: yarn install --frozen-lockfile

      - name: Build CSS assets
        run: yarn build:css

      - name: Prepare test database
        run: bin/rails db:create db:schema:load

      - name: Run RSpec unit tests (models/requests/services/helpers)
        run: bundle exec rspec spec/ --exclude-pattern "spec/system/**"

      - name: Upload coverage to PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info

  test_system:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DB_HOST: localhost
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SECRET_KEY_BASE: "ci_dummy_secret_key_base_for_test_environment_only"
      # system spec は unit spec と別ジョブのため coverage threshold チェックをスキップ
      SKIP_COVERAGE_CHECK: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          bundle-without: production

      - name: Cache apt packages
        id: cache-libvips
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives/*.deb
          key: apt-libvips-${{ runner.os }}
          restore-keys: |
            apt-libvips-

      - name: Install libvips for image processing
        run: sudo apt-get update -qq && sudo apt-get install -y libvips-dev --no-install-recommends

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Install Node.js dependencies
        run: yarn install --frozen-lockfile

      - name: Build CSS assets
        run: yarn build:css

      - name: Set up Chrome (for system specs)
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2

      - name: Export Chrome path for Selenium
        run: |
          echo "BROWSER_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV
          sudo rm -f /usr/bin/chromedriver

      - name: Prepare test database
        run: bin/rails db:create db:schema:load

      - name: Run RSpec system tests
        run: bundle exec rspec spec/system/
