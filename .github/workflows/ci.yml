name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      # DATABASE_URL は未設定とし、database.yml の ERB 展開 + TEST_ENV_NUMBER で
      # 並列ワーカーごとに異なるDB名（kehare_cho_test, kehare_cho_test2, ...）を使用
      DB_HOST: localhost
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      # parallel:create / parallel:prepare で Rails の初期化が必要なため設定（テスト用ダミー値）
      SECRET_KEY_BASE: "ci_dummy_secret_key_base_for_test_environment_only"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          bundle-without: production

      - name: Install libvips for image processing
        run: sudo apt-get update -qq && sudo apt-get install -y libvips-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Install Node.js dependencies
        run: yarn install --frozen-lockfile

      - name: Build CSS assets
        run: yarn build:css

      - name: Set up Chrome (for system specs)
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Export Chrome path for Selenium
        # setup-chrome は "chrome" という名前でインストールするため BROWSER_PATH で明示指定
        # ChromeDriver は Selenium Manager が BROWSER_PATH のバージョンに合わせて自動管理する
        run: echo "BROWSER_PATH=${{ steps.setup-chrome.outputs.chrome-path }}" >> $GITHUB_ENV

      - name: Prepare test database
        run: bin/rails db:create db:schema:load

      - name: Run RSpec tests
        run: bundle exec rspec spec/

      - name: Upload coverage to PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info
